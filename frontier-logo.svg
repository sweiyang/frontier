<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Icon: abstract "F" horizon mark -->
  <g transform="translate(20, 15)">
    <!-- Rounded square backdrop -->
    <rect x="0" y="0" width="90" height="90" rx="20" ry="20" fill="#0f0f0f"/>

    <!-- Stylized horizon lines forming an abstract "F" -->
    <rect x="22" y="24" width="46" height="6" rx="3" fill="url(#accent)"/>
    <rect x="22" y="42" width="34" height="6" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="22" y="60" width="26" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="130" y="76" font-family="'Outfit', 'Inter', sans-serif" font-size="52" font-weight="600" fill="#0f0f0f" letter-spacing="-1">
    frontier
  </text>

  <!-- Subtle tagline -->
  <text x="132" y="98" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#6b6b6b" letter-spacing="3">
    AI PLATFORM
  </text>
</svg>