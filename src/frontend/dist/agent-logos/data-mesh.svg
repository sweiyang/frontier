<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="28" fill="#f5f5f5"/>
  <!-- Grid mesh -->
  <line x1="20" y1="40" x2="100" y2="40" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="20" y1="60" x2="100" y2="60" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="20" y1="80" x2="100" y2="80" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="40" y1="20" x2="40" y2="100" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="20" x2="60" y2="100" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="20" x2="80" y2="100" stroke="#dc2626" stroke-width="0.8" opacity="0.2"/>
  <!-- Data nodes at intersections -->
  <circle cx="40" cy="40" r="5" fill="#dc2626" opacity="0.9"/>
  <circle cx="60" cy="40" r="4" fill="#dc2626" opacity="0.6"/>
  <circle cx="80" cy="40" r="6" fill="#dc2626" opacity="0.8"/>
  <circle cx="40" cy="60" r="4" fill="#dc2626" opacity="0.5"/>
  <circle cx="60" cy="60" r="8" fill="#dc2626"/>
  <circle cx="80" cy="60" r="3" fill="#dc2626" opacity="0.5"/>
  <circle cx="40" cy="80" r="6" fill="#dc2626" opacity="0.7"/>
  <circle cx="60" cy="80" r="4" fill="#dc2626" opacity="0.6"/>
  <circle cx="80" cy="80" r="5" fill="#dc2626" opacity="0.8"/>
  <!-- Center glow -->
  <circle cx="60" cy="60" r="4" fill="#fca5a5" opacity="0.4"/>
</svg>
