<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="50%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#a)"/>
  <!-- Lightbulb body -->
  <circle cx="60" cy="48" r="28" fill="white"/>
  <!-- Filament glow -->
  <circle cx="60" cy="44" r="12" fill="#fef3c7" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="50" cy="46" r="4" fill="#f97316"/>
  <circle cx="70" cy="46" r="4" fill="#f97316"/>
  <circle cx="51" cy="45" r="1.5" fill="white"/>
  <circle cx="71" cy="45" r="1.5" fill="white"/>
  <!-- Open excited mouth -->
  <ellipse cx="60" cy="58" rx="6" ry="5" fill="#f97316"/>
  <ellipse cx="60" cy="56" rx="5" ry="3" fill="white"/>
  <!-- Bulb base -->
  <rect x="50" y="74" width="20" height="6" rx="2" fill="white"/>
  <rect x="52" y="80" width="16" height="4" rx="2" fill="white" opacity="0.8"/>
  <rect x="54" y="84" width="12" height="4" rx="2" fill="white" opacity="0.6"/>
  <!-- Sparkle rays -->
  <line x1="60" y1="8" x2="60" y2="16" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="28" y1="20" x2="34" y2="26" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="92" y1="20" x2="86" y2="26" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="46" x2="24" y2="46" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="96" y1="46" x2="104" y2="46" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="22" y="98" r="3" fill="white" opacity="0.35" cy="98"/>
  <circle cx="98" cy="88" r="2.5" fill="white" opacity="0.3"/>
</svg>
