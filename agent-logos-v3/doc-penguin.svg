<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#a)"/>
  <!-- Body -->
  <ellipse cx="60" cy="66" rx="30" ry="34" fill="#1e293b"/>
  <!-- Belly -->
  <ellipse cx="60" cy="72" rx="18" ry="24" fill="white"/>
  <!-- Eyes -->
  <circle cx="48" cy="48" r="8" fill="white"/>
  <circle cx="72" cy="48" r="8" fill="white"/>
  <circle cx="49" cy="47" r="5" fill="#1e293b"/>
  <circle cx="73" cy="47" r="5" fill="#1e293b"/>
  <circle cx="50.5" cy="45.5" r="2" fill="white"/>
  <circle cx="74.5" cy="45.5" r="2" fill="white"/>
  <!-- Beak -->
  <polygon points="56,56 60,64 64,56" fill="#fbbf24"/>
  <!-- Blush -->
  <ellipse cx="42" cy="56" rx="5" ry="3" fill="#fca5a5" opacity="0.4"/>
  <ellipse cx="78" cy="56" rx="5" ry="3" fill="#fca5a5" opacity="0.4"/>
  <!-- Flippers holding clipboard -->
  <ellipse cx="30" cy="70" rx="8" ry="16" fill="#1e293b" transform="rotate(15 30 70)"/>
  <ellipse cx="90" cy="70" rx="8" ry="16" fill="#1e293b" transform="rotate(-15 90 70)"/>
  <!-- Clipboard -->
  <rect x="44" y="72" width="32" height="24" rx="3" fill="#e2e8f0"/>
  <rect x="54" y="70" width="12" height="6" rx="3" fill="#94a3b8"/>
  <line x1="50" y1="82" x2="70" y2="82" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="88" x2="66" y2="88" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Feet -->
  <ellipse cx="48" cy="100" rx="8" ry="4" fill="#fbbf24"/>
  <ellipse cx="72" cy="100" rx="8" ry="4" fill="#fbbf24"/>
</svg>
