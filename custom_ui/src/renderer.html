<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Renderer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import Renderer from "/src/Renderer.svelte";

    const schema = JSON.parse(
      localStorage.getItem("ui-schema")
    );

    if (schema) {
      new Renderer({
        target: document.getElementById("app"),
        props: { schema }
      });
    } else {
      document.getElementById("app").innerHTML = "<p style='padding: 20px; color: #999;'>Upload a JSON file to see the rendered UI</p>";
    }
  </script>
</body>
</html>
